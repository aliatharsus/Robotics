<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 PID Controller with Live Plotter</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: sans-serif; }

.header { background: #eee; padding: 10px; border-bottom: 1px solid #ccc; }

.header-content { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }

.title { font-size: 18px; font-weight: bold; }

.connection-controls { display: flex; align-items: center; gap: 8px; }

.status { padding: 4px 8px; border: 1px solid; font-size: 12px; display: flex; align-items: center; gap: 6px; }

.status.connected { border-color: green; color: green; }

.status.disconnected { border-color: red; color: red; }

.status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

button { padding: 4px 10px; cursor: pointer; }

button:disabled { opacity: 0.5; cursor: not-allowed; }

.main-container { display: grid; grid-template-columns: 280px 1fr 240px; gap: 10px; padding: 10px; height: calc(100vh - 60px); }

.control-panel, .tools-panel { border: 1px solid #ccc; padding: 10px; overflow-y: auto; }

.panel-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }

.param-group { margin-bottom: 12px; padding: 8px; border: 1px solid #ccc; }

.param-label { font-size: 12px; display: flex; justify-content: space-between; margin-bottom: 6px; }

.input-group { display: flex; gap: 6px; }

input[type="number"] { flex: 1; padding: 4px; font-size: 14px; }

.tool-section { margin-bottom: 12px; padding: 8px; border: 1px solid #ccc; }

.tool-section-title { font-size: 11px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }

.radio-group { display: flex; flex-direction: column; gap: 6px; }

.radio-item { display: flex; align-items: center; gap: 6px; }

.range-inputs { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }

.range-input-group { display: flex; align-items: center; gap: 6px; }

.range-input-group label { min-width: 40px; font-size: 12px; }

.range-input-group input { width: 80px ; flex: 1; padding: 4px; }

.coordinates-display { padding: 8px; border: 1px solid #ccc; font-family: monospace; font-size: 12px; }

.coord-row { display: flex; justify-content: space-between; margin-bottom: 4px; }

.plot-container { border: 1px solid #ccc; padding: 10px; display: flex; flex-direction: column; }

.plot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }

.plot-title { font-size: 14px; font-weight: bold; }

.plot-controls { display: flex; gap: 8px; align-items: center; }

.control-item { display: flex; align-items: center; gap: 4px; }

.control-item label { font-size: 12px; }

.control-item input { width: 80px; padding: 4px; font-size: 12px; }

.stats { display: flex; gap: 12px; font-size: 11px; }

.stat-item { display: flex; flex-direction: column; }

.stat-label { font-size: 10px; font-weight: bold; }

.canvas-wrapper { flex: 1; background: #fff; border: 1px solid #ccc; position: relative; min-height: 400px; cursor: crosshair; }

canvas { display: block; width: 100%; height: 100%; }

.no-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #aaa; font-size: 14px; text-align: center; pointer-events: none; }

.crosshair-v { width: 1px; background: rgba(0,0,100,0.3); height: 100%; position: absolute; pointer-events: none; }

.crosshair-h { height: 1px; background: rgba(0,0,100,0.3); width: 100%; position: absolute; pointer-events: none; }

@media (max-width: 1400px) { .main-container { grid-template-columns: 1fr; height: auto; } .canvas-wrapper { min-height: 400px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="title">Frame Frmat : "%f %f\n", x, y</div>
            <div class="connection-controls">
                <div id="status" class="status disconnected">
                    <div class="status-dot"></div>
                    <span>Disconnected</span>
                </div>
                <button id="connectBtn" class="btn-connect">Connect to Device</button>
                <button id="disconnectBtn" class="btn-disconnect" style="display:none;">Disconnect</button>
            </div>
        </div>
    </div>
    
    <div class="main-container">
        <div class="control-panel">
            <div class="panel-title">PID Parameters</div>
            
            <div class="param-group">
                <div class="param-label">
                    <span class="param-name">Kp</span>
                    <span class="param-value" id="kpValue">--</span>
                </div>
                <div class="input-group">
                    <input type="number" id="kpInput" step="0.05" value="0.5" placeholder="Proportional">
                    <button class="btn-send" onclick="sendParameter('kp')" disabled id="kpBtn">Send</button>
                </div>
            </div>
            
            <div class="param-group">
                <div class="param-label">
                    <span class="param-name">Ki</span>
                    <span class="param-value" id="kiValue">--</span>
                </div>
                <div class="input-group">
                    <input type="number" id="kiInput" step="0.05" value="2.5" placeholder="Integral">
                    <button class="btn-send" onclick="sendParameter('ki')" disabled id="kiBtn">Send</button>
                </div>
            </div>
            
            <div class="param-group">
                <div class="param-label">
                    <span class="param-name">Kd</span>
                    <span class="param-value" id="kdValue">--</span>
                </div>
                <div class="input-group">
                    <input type="number" id="kdInput" step="0.001" value="0.001" placeholder="Derivative">
                    <button class="btn-send" onclick="sendParameter('kd')" disabled id="kdBtn">Send</button>
                </div>
            </div>
			
			<div class="param-group">
                <div class="param-label">
                    <span class="param-name">TV</span>
                    <span class="param-value" id="tvValue">--</span>
                </div>
                <div class="input-group">
                    <input type="number" id="tvInput" step="1" value="7000" placeholder="Target Velocity">
                    <button class="btn-send" onclick="sendParameter('tv')" disabled id="tvBtn">Send</button>
                </div>
            </div>
        </div>
        
        <div class="plot-container">
            <div class="plot-header">
                <div class="plot-title">Real-Time Response</div>
                <div class="plot-controls">
                    <div class="control-item">
                        <label>Max Points:</label>
                        <input type="number" id="maxPoints" value="1000" min="10" max="10000">
                    </div>
					<div class="control-item">
						<label>Avg Window:</label>
						<input type="number" id="avgWindow" value="1000" min="1" max="1000">
					</div>
                    <button id="clearBtn" class="btn-clear">Clear</button>
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-label">POINTS</span>
                            <span class="stat-value" id="pointCount">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">RATE</span>
                            <span class="stat-value" id="dataRate">0 Hz</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">FPS</span>
                            <span class="stat-value" id="fps">0</span>
                        </div>
						<div class="stat-item">
							<span class="stat-label">MOVING AVG</span>
							<span class="stat-value" id="avgValue">--</span>
						</div>
                    </div>
                </div>
            </div>
            
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="plotCanvas"></canvas>
                <div class="no-data" id="noData">Waiting for data...</div>
            </div>
        </div>
        
        <div class="tools-panel">
            <div class="panel-title">Plot Tools</div>
            
            <div class="tool-section">
                <div class="tool-section-title">Y-Axis Scaling</div>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="dynamicScale" name="yScale" value="dynamic" checked>
                        <label for="dynamicScale">Dynamic (Auto-scale)</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="staticScale" name="yScale" value="static">
                        <label for="staticScale">Static (Fixed range)</label>
                    </div>
                </div>
                
                <div class="range-inputs" id="rangeInputs" style="display: none;">
                    <div class="range-input-group">
                        <label>Min:</label>
                        <input type="number" id="yMin" value="-8000" step="100">
                    </div>
                    <div class="range-input-group">
                        <label>Max:</label>
                        <input type="number" id="yMax" value="8000" step="100">
                    </div>
                </div>
            </div>
            
            <div class="tool-section">
                <div class="tool-section-title">Mouse Position</div>
                <div class="coordinates-display">
                    <div class="coord-row">
                        <span class="coord-label">Time:</span>
                        <span class="coord-value" id="mouseTime">--</span>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">Value:</span>
                        <span class="coord-value" id="mouseValue">--</span>
                    </div>
                </div>
            </div>
            
            <div class="tool-section">
                <div class="tool-section-title">Current Range</div>
                <div class="coordinates-display">
                    <div class="coord-row">
                        <span class="coord-label">Y Min:</span>
                        <span class="coord-value" id="currentYMin">--</span>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">Y Max:</span>
                        <span class="coord-value" id="currentYMax">--</span>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">X Min:</span>
                        <span class="coord-value" id="currentXMin">--</span>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">X Max:</span>
                        <span class="coord-value" id="currentXMax">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('plotCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const canvasWrapper = document.getElementById('canvasWrapper');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const noDataDiv = document.getElementById('noData');
        const pointCountDiv = document.getElementById('pointCount');
        const dataRateDiv = document.getElementById('dataRate');
        const fpsDiv = document.getElementById('fps');
        const maxPointsInput = document.getElementById('maxPoints');
        const dynamicScaleRadio = document.getElementById('dynamicScale');
        const staticScaleRadio = document.getElementById('staticScale');
        const rangeInputsDiv = document.getElementById('rangeInputs');
        const yMinInput = document.getElementById('yMin');
        const yMaxInput = document.getElementById('yMax');
        const mouseTimeDiv = document.getElementById('mouseTime');
        const mouseValueDiv = document.getElementById('mouseValue');
        const currentYMinDiv = document.getElementById('currentYMin');
        const currentYMaxDiv = document.getElementById('currentYMax');
        const currentXMinDiv = document.getElementById('currentXMin');
        const currentXMaxDiv = document.getElementById('currentXMax');
		const avgWindowInput = document.getElementById('avgWindow');
		const avgValueDiv = document.getElementById('avgValue');


		let avgWindowSize = parseInt(avgWindowInput.value);
        
        let port = null;
        let reader = null;
        let writer = null;
        let keepReading = false;
        let dataBuffer = [];
        let maxPoints = parseInt(maxPointsInput.value);
        let textDecoder = new TextDecoder();
        let partialLine = '';
        
        // Plot settings
        let useStaticScale = false;
        let staticYMin = -8000;
        let staticYMax = 8000;
        let currentPlotBounds = { minVal: 0, maxVal: 0, minTime: 0, maxTime: 0 };
        
        // Performance tracking
        let lastUpdateTime = Date.now();
        let dataCount = 0;
        let frameCount = 0;
        let lastFpsTime = Date.now();
		let myRateTry = 0;
		let myRateTryLast = 0;
        
        // Canvas setup
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // Scale mode toggle
        dynamicScaleRadio.addEventListener('change', () => {
            useStaticScale = false;
            rangeInputsDiv.style.display = 'none';
        });
        
        staticScaleRadio.addEventListener('change', () => {
            useStaticScale = true;
            rangeInputsDiv.style.display = 'block';
        });
        
        yMinInput.addEventListener('change', () => {
            staticYMin = parseFloat(yMinInput.value);
        });
        
        yMaxInput.addEventListener('change', () => {
            staticYMax = parseFloat(yMaxInput.value);
        });
        
        maxPointsInput.addEventListener('change', () => {
            maxPoints = parseInt(maxPointsInput.value);
            if (dataBuffer.length > maxPoints) {
                dataBuffer = dataBuffer.slice(-maxPoints);
            }
        });
        
        // Mouse tracking
        canvasWrapper.addEventListener('mousemove', (e) => {
            if (dataBuffer.length === 0) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const padding = 60;
            const plotW = rect.width - padding * 2;
            const plotH = rect.height - padding * 2;
            
            if (x < padding || x > rect.width - padding || y < padding || y > rect.height - padding) {
                mouseTimeDiv.textContent = '--';
                mouseValueDiv.textContent = '--';
                return;
            }
            
            const { minVal, maxVal, minTime, maxTime } = currentPlotBounds;
            const timeRange = maxTime - minTime || 1;
            const valRange = maxVal - minVal || 1;
            
            const timeValue = minTime + ((x - padding) / plotW) * timeRange;
            const valueValue = maxVal - ((y - padding) / plotH) * valRange;
            
            mouseTimeDiv.textContent = timeValue.toFixed(4);
            mouseValueDiv.textContent = valueValue.toFixed(4);
        });
        
        canvasWrapper.addEventListener('mouseleave', () => {
            mouseTimeDiv.textContent = '--';
            mouseValueDiv.textContent = '--';
        });
        
		avgWindowInput.addEventListener('change', () => {
			let val = parseInt(avgWindowInput.value);
			if(val < 1) val = 1;
			avgWindowSize = val;
		});
		
        function updateConnectionStatus(connected) {
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = '<div class="status-dot"></div><span>Connected</span>';
                connectBtn.style.display = 'none';
                disconnectBtn.style.display = 'block';
                document.getElementById('kpBtn').disabled = false;
                document.getElementById('kiBtn').disabled = false;
                document.getElementById('kdBtn').disabled = false;
				document.getElementById('tvBtn').disabled = false;
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.innerHTML = '<div class="status-dot"></div><span>Disconnected</span>';
                connectBtn.style.display = 'block';
                disconnectBtn.style.display = 'none';
                document.getElementById('kpBtn').disabled = true;
                document.getElementById('kiBtn').disabled = true;
                document.getElementById('kdBtn').disabled = true;
				document.getElementById('tvBtn').disabled = true;
            }
        }
        
        async function connect() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                writer = port.writable.getWriter();
                reader = port.readable.getReader();
                keepReading = true;
                
                updateConnectionStatus(true);
                readData();
            } catch (error) {
                console.error('Connection error:', error);
                alert('Failed to connect: ' + error.message);
            }
        }
        
        async function disconnect() {
            keepReading = false;
            
            try {
                if (reader) {
                    await reader.cancel();
                    reader.releaseLock();
                    reader = null;
                }
                if (writer) {
                    writer.releaseLock();
                    writer = null;
                }
                if (port) {
                    await port.close();
                    port = null;
                }
                
                updateConnectionStatus(false);
            } catch (error) {
                console.error('Disconnect error:', error);
            }
        }
        
        async function readData() {
            try {
                while (keepReading && reader) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const text = textDecoder.decode(value, { stream: true });
                    const lines = (partialLine + text).split('\n');
                    partialLine = lines.pop() || '';
                    
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed) {
                            parseLine(trimmed);
                        }
                    }
                }
            } catch (error) {
                console.error('Read error:', error);
                disconnect();
            }
        }
        
        function parseLine(line) {
            const parts = line.split(/\s+/);
            if (parts.length >= 2) {
                const value = parseFloat(parts[0]);
                const time = parseFloat(parts[1]);
                
                if (!isNaN(value) && !isNaN(time)) {
                    dataBuffer.push({ value, time });
                    
                    if (dataBuffer.length > maxPoints) {
                        dataBuffer.shift();
                    }
                    
                    dataCount++;
                    
                    const now = Date.now();
					const delta = time-myRateTryLast;
					myRateTryLast = time;
					const rateMine = 1/delta;
					dataRateDiv.textContent = rateMine.toFixed(1) + ' Hz';
                    if (now - lastUpdateTime >= 1000) {
                        const rate = dataCount / ((now - lastUpdateTime) / 1000);
                        //dataRateDiv.textContent = rate.toFixed(1) + ' Hz';
                        dataCount = 0;
                        lastUpdateTime = now;
                    }
                }
            }
        }
        
        function floatToBytes(value) {
            const buffer = new ArrayBuffer(4);
            const view = new DataView(buffer);
            view.setFloat32(0, value, true);
            return new Uint8Array(buffer);
        }
        
        async function sendParameter(param) {
            if (!writer) {
                alert('Not connected to device');
                return;
            }
            
            let header, value, inputId, valueDisplay;
            
            if (param === 'kp') {
                header = 0xEA;
                inputId = 'kpInput';
                valueDisplay = 'kpValue';
            } else if (param === 'ki') {
                header = 0xEB;
                inputId = 'kiInput';
                valueDisplay = 'kiValue';
            } else if (param === 'kd') {
                header = 0xEC;
                inputId = 'kdInput';
                valueDisplay = 'kdValue';
            }
			else if (param === 'tv') {
                header = 0xED;
                inputId = 'tvInput';
                valueDisplay = 'tvValue';
            }
            
            value = parseFloat(document.getElementById(inputId).value);
            
            if (isNaN(value)) {
                alert(`Invalid ${param.toUpperCase()} value`);
                return;
            }
            
            try {
                const floatBytes = floatToBytes(value);
                const packet = new Uint8Array(5);
                packet[0] = header;
                packet[1] = floatBytes[0];
                packet[2] = floatBytes[1];
                packet[3] = floatBytes[2];
                packet[4] = floatBytes[3];
                
                await writer.write(packet);
                
                document.getElementById(valueDisplay).textContent = value.toFixed(3);
                
                const btn = document.getElementById(param + 'Btn');
                const originalBg = btn.style.background;
                btn.style.background = '#2196F3';
                setTimeout(() => {
                    btn.style.background = originalBg;
                }, 200);
                
            } catch (error) {
                console.error('Send error:', error);
                alert('Failed to send: ' + error.message);
            }
        }
        
        function clearData() {
            dataBuffer = [];
            partialLine = '';
            pointCountDiv.textContent = '0';
        }
        
        function draw() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, w, h);
            
            if (dataBuffer.length === 0) {
				noDataDiv.style.display = 'block';
				avgValueDiv.textContent = '--';
				requestAnimationFrame(draw);
				return;
			}
            
            noDataDiv.style.display = 'none';
            pointCountDiv.textContent = dataBuffer.length;
			pointCountDiv.textContent = dataBuffer.length;

			const count = Math.min(dataBuffer.length, avgWindowSize);
			let sum = 0;
			for (let i = 0; i < count; i++) {
				sum += dataBuffer[dataBuffer.length - 1 - i].value;
			}
			avgValueDiv.textContent = (sum / count).toFixed(3);
            
            const values = dataBuffer.map(d => d.value);
            const times = dataBuffer.map(d => d.time);
            
            let minVal, maxVal;
            if (useStaticScale) {
                minVal = staticYMin;
                maxVal = staticYMax;
            } else {
                minVal = Math.min(...values);
                maxVal = Math.max(...values);
            }
            
            const minTime = Math.min(...times);
            const maxTime = Math.max(...times);
            
            // Store current bounds
            currentPlotBounds = { minVal, maxVal, minTime, maxTime };
            
            // Update range display
            currentYMinDiv.textContent = minVal.toFixed(3);
            currentYMaxDiv.textContent = maxVal.toFixed(3);
            currentXMinDiv.textContent = minTime.toFixed(3);
            currentXMaxDiv.textContent = maxTime.toFixed(3);
            
            const padding = 60;
            const plotW = w - padding * 2;
            const plotH = h - padding * 2;
            
            const valRange = maxVal - minVal || 1;
            const timeRange = maxTime - minTime || 1;
            
            // Draw grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 10; i++) {
                const y = padding + (plotH / 10) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(w - padding, y);
                ctx.stroke();
            }
            
            for (let i = 0; i <= 10; i++) {
                const x = padding + (plotW / 10) * i;
                ctx.beginPath();
                ctx.moveTo(x, padding);
                ctx.lineTo(x, h - padding);
                ctx.stroke();
            }
            
            // Draw axes
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, h - padding);
            ctx.lineTo(w - padding, h - padding);
            ctx.stroke();
            
            // Draw labels
            ctx.fillStyle = '#666';
            ctx.font = '11px monospace';
            ctx.textAlign = 'right';
            
            for (let i = 0; i <= 5; i++) {
                const y = padding + (plotH / 5) * i;
                const val = maxVal - (valRange / 5) * i;
                ctx.fillText(val.toFixed(2), padding - 10, y + 4);
            }
            
            ctx.textAlign = 'center';
            for (let i = 0; i <= 5; i++) {
                const x = padding + (plotW / 5) * i;
                const t = minTime + (timeRange / 5) * i;
                ctx.fillText(t.toFixed(2), x, h - padding + 20);
            }
            
            // Axis labels
            ctx.fillStyle = '#999';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Time', w / 2, h - 10);
            
            ctx.save();
            ctx.translate(15, h / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('Value', 0, 0);
            ctx.restore();
            
            // Draw gradient under line
            const gradient = ctx.createLinearGradient(0, padding, 0, h - padding);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
            gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(padding, h - padding);
            
            for (let i = 0; i < dataBuffer.length; i++) {
                const point = dataBuffer[i];
                const x = padding + ((point.time - minTime) / timeRange) * plotW;
                const y = h - padding - ((point.value - minVal) / valRange) * plotH;
                ctx.lineTo(x, y);
            }
            
            ctx.lineTo(padding + ((dataBuffer[dataBuffer.length - 1].time - minTime) / timeRange) * plotW, h - padding);
            ctx.closePath();
            ctx.fill();
            
            // Draw line
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            
            for (let i = 0; i < dataBuffer.length; i++) {
                const point = dataBuffer[i];
                const x = padding + ((point.time - minTime) / timeRange) * plotW;
                const y = h - padding - ((point.value - minVal) / valRange) * plotH;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            ctx.stroke();
            
            // Draw points (only if not too many)
            if (dataBuffer.length < 500) {
                ctx.fillStyle = '#667eea';
                for (const point of dataBuffer) {
                    const x = padding + ((point.time - minTime) / timeRange) * plotW;
                    const y = h - padding - ((point.value - minVal) / valRange) * plotH;
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // Update FPS
            frameCount++;
            const now = Date.now();
            if (now - lastFpsTime >= 1000) {
                fpsDiv.textContent = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }
            
            requestAnimationFrame(draw);
        }
        
        // Event listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        clearBtn.addEventListener('click', clearData);
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                if (document.activeElement.id === 'kpInput') sendParameter('kp');
                else if (document.activeElement.id === 'kiInput') sendParameter('ki');
                else if (document.activeElement.id === 'kdInput') sendParameter('kd');
				else if (document.activeElement.id === 'tvInput') sendParameter('tv');
            }
        });
        
        // Check Web Serial API support
        if (!('serial' in navigator)) {
            alert('Web Serial API not supported. Use Chrome, Edge, or Opera.');
            connectBtn.disabled = true;
        }
        
        // Start animation loop
        draw();
    </script>
</body>
</html>
